name: Confluence Scanner

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run scanner
        env:
          TWELVEDATA_KEY_1: ${{ secrets.TWELVEDATA_KEY_1 }}
          TWELVEDATA_KEY_2: ${{ secrets.TWELVEDATA_KEY_2 }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: python scanner.py

      - name: Commit updated state
        run: |
          git config user.name "confluence-bot"
          git config user.email "actions@users.noreply.github.com"
          git add state.json
          git diff --cached --quiet || git commit -m "Update scan state"
          git push
